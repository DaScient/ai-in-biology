name: Deploy Site to GitHub Pages

# Single source of truth for https://dascient.github.io/ai-in-biology/
# Layout published to Pages:
#   /            -> root index.html landing page (homepage)
#   /docs/       -> MkDocs documentation site
#   /app/        -> Astro interactive frontend
on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'frontend/**'
      - 'docs/**'
      - 'mkdocs.yml'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

# Permissions required to deploy to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, without cancelling in-progress runs
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Build documentation (MkDocs)
        run: |
          pip install -r docs/requirements.txt
          mkdocs build --strict --site-dir _site/docs

      - name: Build frontend (Astro)
        run: |
          cd frontend
          npm ci
          npm run build
          cd ..
          mkdir -p _site/app
          cp -r frontend/dist/. _site/app/

      - name: Add homepage and root assets
        run: |
          cp index.html _site/index.html
          touch _site/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
