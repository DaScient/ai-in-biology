name: Build Docs

# Validation-only check for the MkDocs site. Publishing to GitHub Pages is
# handled by the unified deploy-pages.yml workflow, so this workflow no longer
# runs `mkdocs gh-deploy` (which would push a competing gh-pages branch).
on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - ".github/workflows/docs-build.yml"
  pull_request:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install documentation dependencies
        run: |
          pip install -r docs/requirements.txt

      - name: Build docs
        run: mkdocs build --strict
